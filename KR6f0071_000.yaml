front:
  text: 御製無量壽佛贊西方極樂世界尊無量壽佛世希有能滅無始億劫業令彼苦惱悉消除若人能以微妙心甞以極樂為觀想廣與眾生分別說舉目即見阿彌陀佛身色相顯光明閻浮檀金無與等其高無比由旬數六十萬億那由他眉間白毫五須彌紺眼弘澄四大海光明演出諸毛孔一孔遍含諸大千一界中有一河沙沙有八萬四千相一一相中復如是作者觀者隨現前以觀佛身見佛心眾生憶想見化佛從相入得無生忍以三昧受無邊慈佛身無量廣無邊化導以彼宿願力有憶想者得成就神通如意滿虛空眾生三種具三心精進勇猛無退轉即得如來手接引七寶宮殿大光明其身踴躍金剛臺隨從佛後彈指頃行大乘解第一義即生七寶蓮池中阿彌陀佛大慈悲十力威德難贊說稱名一聲起一念八十億劫罪皆除以是濟拔無有窮是以名為無量壽昔世尊居耆闍崛與大眾說妙因緣離憂惱與閻浮提超脫一切諸苦趣淨妙國即極樂界修三福發菩提心作是念者住堅專故說無量壽佛觀如是功德不可說不可說者妙光明無量清淨平等施五濁眾生咸作佛斷彼一切顛倒想猶如以水投海中濕性混合無不同雖有聖智難分別人人皆為無量壽稽首瞻禮即西方
